services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=fiap_tech
      - DB_NAME=dimdim_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dimdim_network
    restart: always

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=fiap_tech
      - MYSQL_DATABASE=dimdim_db
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dimdim_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dimdim_network:
    driver: bridge

volumes:
  db_data: